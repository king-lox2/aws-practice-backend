name: Deploy Node Application

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t everistben/nodejs-app:latest .

      - name: Publish Image to Docker Hub
        run: docker push everistben/nodejs-app:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Free disk space (CRITICAL FIX)
        run: |
          docker system prune -a -f
          docker volume prune -f
          rm -rf /home/ubuntu/actions-runner-node/_work/*
          rm -rf /home/ubuntu/actions-runner-node/_diag/*

      - name: Pull image from Docker Hub
        run: docker pull everistben/nodejs-app:latest

      - name: Delete old container
        run: docker rm -f nodejs-app-container || true

      - name: Run Docker Container
        run: |
          docker run -d -p 4000:4000 \
          --name nodejs-app-container \
          -e MONGO_URI='${{ secrets.MONGO_URI }}' \
          -e JWT_CONFI='${{ secrets.JWT_CONFI }}' \
          -e EXPR_DEAD='${{ secrets.EXPR_DEAD }}' \
          -e FRONTEND_URL='${{ secrets.FRONTEND_URL }}' \
          -e STRIPE_SECRET_KEY='${{ secrets.STRIPE_SECRET_KEY }}' \
          everistben/nodejs-app:latest